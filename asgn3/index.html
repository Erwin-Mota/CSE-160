<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>CSE 160 — Voxel World (Assignment 3)</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, sans-serif;
      background: #9ecfff;
      color: #1a2744;
    }
    #webgl {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
    }
    #hud {
      position: fixed;
      left: 16px;
      top: 16px;
      max-width: 520px;
      padding: 16px 20px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(40, 70, 120, 0.35);
      border-radius: 10px;
      font-size: 15px;
      line-height: 1.5;
      color: #0f2245;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.35);
      pointer-events: none;
    }
    #help {
      position: fixed;
      right: 16px;
      bottom: 16px;
      max-width: 520px;
      min-width: 280px;
      padding: 18px 22px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(40, 70, 120, 0.35);
      border-radius: 10px;
      font-size: 15px;
      line-height: 1.55;
      color: #0f2245;
      pointer-events: none;
    }
  </style>
</head>
<body onload="main()">
  <canvas id="webgl" width="800" height="600">Please use a WebGL-capable browser.</canvas>
  <div id="hud">
    <span id="hud-game">Loading…</span>
  </div>
  <div id="help">
    <b>Move</b> W A S D · <b>Turn</b> Q E · <b>Look</b> mouse (click canvas for pointer lock)<br />
    <b>Blocks</b> F place · V remove (interior cells only, not on map edge or mob clearings)
  </div>

  <script src="lib/webgl-utils.js"></script>
  <script src="lib/webgl-debug.js"></script>
  <script src="lib/cuon-utils.js"></script>
  <script src="lib/cuon-matrix-cse160.js"></script>
  <script src="camera.js"></script>
  <script src="entities.js"></script>
  <script src="main.js"></script>
</body>
</html>
