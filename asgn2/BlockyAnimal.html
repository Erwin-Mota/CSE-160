<!DOCTYPE html>
 <html lang="en">
 <head>
 <meta charset="utf-8" />
 <title>Draw a point (1)</title>
 </head>

<body onload="main()">
<canvas id="webgl" width="500" height="500">
Please use a browser that supports canvas.
</canvas>

<p>
  <label>Global Y Rotation</label>
  <input type="range" id="globalYSlide" min="-180" max="180" value="0">
</p>
<p>
  <button id="animOnButton">Animation ON</button>
  <button id="animOffButton">Animation OFF</button>
</p>
<p>
  <b>Left Wing Chain Joints</b><br>
  <label>Upper Wing</label>
  <input type="range" id="leftWingUpperSlide" min="-90" max="90" value="20">
  <label>Lower Wing</label>
  <input type="range" id="leftWingLowerSlide" min="-120" max="45" value="-30">
  <label>Wing Tip</label>
  <input type="range" id="leftWingTipSlide" min="-90" max="90" value="10">
</p>
<p>
  <label>Right Wing Upper</label>
  <input type="range" id="rightWingUpperSlide" min="-90" max="90" value="-20">
  <label>Right Wing Lower</label>
  <input type="range" id="rightWingLowerSlide" min="-120" max="45" value="-25">
  <label>Head Tilt</label>
  <input type="range" id="headSlide" min="-40" max="40" value="0">
</p>
<p>
  <label>Left Foot</label>
  <input type="range" id="leftFootSlide" min="-45" max="30" value="-8">
  <label>Right Foot</label>
  <input type="range" id="rightFootSlide" min="-45" max="30" value="-8">
</p>
<p>
  <label>Left Leg</label>
  <input type="range" id="leftLegSlide" min="-30" max="30" value="0">
  <label>Right Leg</label>
  <input type="range" id="rightLegSlide" min="-30" max="30" value="0">
</p>
<p id="numdot"></p>

<script src="lib/webgl-utils.js"></script>
<script src="lib/webgl-debug.js"></script>
<script src="lib/cuon-utils.js"></script>
<script src="lib/cuon-matrix-cse160.js"></script>

<script src="Triangle.js"></script>
<script src="Cube.js"></script>
<script src="Pyramid.js"></script>
<script src="BlockyAnimal.js"></script>

</body>
 </html>
