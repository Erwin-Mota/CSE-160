<!DOCTYPE html>
 <html lang="en">
   <head>
       <meta charset="utf-8" />
       <title>Draw a blue rectangle (canvas version)</title>
       <script src="/CSE-160/lib/cuon-matrix-cse160.js"></script>
   </head>

   
   <body onload="main()">
           <canvas id="example" width="400" height="400">
      Please use a browser that supports "canvas"
      </canvas>

      <p>
      <br><br>
      v1: x <input id="v1x" type="number">
          y <input id="v1y" type="number">
      <br><br>
      v2: x <input id="v2x" type="number">
          y <input id="v2y" type="number">
      <p>
      <input type="button"
             value="Draw"
             onclick="handleDrawEvent()"
             >
      <br><br>
      <p>Operation:
    <select id="operation">
      <option value="add">Add</option>
      <option value="sub">Subtract</option>
      <option value="mul">Multiply</option>
      <option value="div">Divide</option>
      <option value="mag">Magnitude</option>     <!-- NEW -->
      <option value="norm">Normalize</option>
      <option value="angle">Angle between</option> 
      <option value="area">Area</option>
    </select>

 
    <input id="scalar" 
         type="number"  
         placeholder="scalar">
    <p>
      <button onclick="handleDrawOperationEvent()">Draw</button>

      <script src="/CSE-160/src/asg0.js"></script>
  </body>
</html>
